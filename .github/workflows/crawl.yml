# ContestTrace：定时爬取 + 导出快照（可选手动触发）
# 北京时间早 8 点 ≈ UTC 0:00，晚 6 点 ≈ UTC 10:00（随夏令时可能有偏差，可按需调整）

name: ContestTrace Crawl

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler and snapshot
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          python scripts/crawl_and_snapshot.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/latest_snapshot.csv || true
          git diff --staged --quiet || git commit -m "chore: update crawl snapshot [skip ci]"
          git push || true

      - name: Alert on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.GHA_ALERT_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -sS -X POST "$WEBHOOK" -H "Content-Type: text/plain" --data "ContestTrace crawl failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
          fi
