# 大模型与推荐（敏感信息仅允许来自环境变量，禁止写真实 Key 到仓库）
# 复制 .env.example 为 .env 后填写；或仅在系统环境变量中配置

llm:
  # OpenAI 兼容接口（含本地 Ollama、OneAPI 等）：通过环境变量 OPENAI_API_KEY、OPENAI_BASE_URL 注入
  provider: "openai_compatible"
  env_api_key: "OPENAI_API_KEY"
  env_base_url: "OPENAI_BASE_URL"
  env_model: "OPENAI_MODEL"
  default_model: "gpt-4o-mini"
  timeout_seconds: 60
  max_tokens: 1024

recommendation:
  # 无 API Key 时自动降级为「规则 + TF-IDF 相似度」推荐，仍返回匹配度与理由
  fallback_to_rules: true
  max_candidates: 30
