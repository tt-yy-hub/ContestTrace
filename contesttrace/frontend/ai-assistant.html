<div class="ai-float-button" id="ai-float-button">
    <span class="ai-button-text">AI</span>
</div>

<div class="ai-chat-dialog" id="ai-chat-dialog">
    <div class="ai-dialog-header" id="ai-dialog-header">
        <div class="ai-dialog-title">
            <i class="fas fa-robot"></i>
            <span>AI 竞赛助手</span>
        </div>
        <button class="ai-dialog-close" id="ai-dialog-close">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="ai-dialog-body" id="ai-dialog-body">
        <div class="ai-welcome-message">
            <p>👋 你好！我是AI竞赛助手</p>
            <p>我可以帮你推荐适合的学科竞赛，请告诉我你的专业或兴趣领域！</p>
        </div>
    </div>
    <div class="ai-dialog-footer">
        <input type="text" class="ai-input" id="ai-input" placeholder="输入你的问题...">
        <button class="ai-send-btn" id="ai-send-btn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>
