<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContestTrace - 竞赛信息智能采集与自动化平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">ContestTrace</h1>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-section="list">竞赛列表</a>
                <a href="#" class="nav-link" data-section="recommend">个性化推荐</a>
                <a href="#" class="nav-link" data-section="stats">数据统计</a>
                <a href="#" class="nav-link" data-section="settings">设置</a>
            </div>
        </div>
    </nav>

    <!-- 搜索栏 -->
    <div class="search-container">
        <div class="container">
            <input type="text" id="search-input" placeholder="搜索竞赛...">
            <button id="search-btn">搜索</button>
            <select id="filter-category">
                <option value="">全部分类</option>
                <option value="学科竞赛">学科竞赛</option>
                <option value="技能竞赛">技能竞赛</option>
                <option value="创业竞赛">创业竞赛</option>
                <option value="文体竞赛">文体竞赛</option>
                <option value="其他竞赛">其他竞赛</option>
            </select>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="main-content">
        <div class="container">
            <!-- 竞赛列表 section -->
            <section id="list-section" class="section active">
                <h2>竞赛列表</h2>
                <div class="contest-list" id="contest-list">
                    <!-- 竞赛卡片将通过JS动态生成 -->
                </div>
                <div class="pagination" id="pagination">
                    <!-- 分页控件将通过JS动态生成 -->
                </div>
            </section>

            <!-- 个性化推荐 section -->
            <section id="recommend-section" class="section">
                <h2>个性化推荐</h2>
                <div class="contest-list" id="recommend-list">
                    <!-- 推荐竞赛将通过JS动态生成 -->
                </div>
            </section>

            <!-- 数据统计 section -->
            <section id="stats-section" class="section">
                <h2>数据统计</h2>
                <div class="stats-container">
                    <div class="stats-card">
                        <h3>总竞赛数</h3>
                        <p id="total-contests">0</p>
                    </div>
                    <div class="stats-card">
                        <h3>按分类统计</h3>
                        <canvas id="category-chart"></canvas>
                    </div>
                    <div class="stats-card">
                        <h3>按月份统计</h3>
                        <canvas id="month-chart"></canvas>
                    </div>
                </div>
            </section>

            <!-- 设置 section -->
            <section id="settings-section" class="section">
                <h2>设置</h2>
                <div class="settings-container">
                    <div class="setting-item">
                        <label for="notification-toggle">启用浏览器通知</label>
                        <input type="checkbox" id="notification-toggle">
                    </div>
                    <div class="setting-item">
                        <label for="keywords-input">订阅关键词（用逗号分隔）</label>
                        <input type="text" id="keywords-input" placeholder="例如：数学,计算机,创业">
                    </div>
                    <div class="setting-item">
                        <button id="save-settings">保存设置</button>
                    </div>
                    <div class="setting-item">
                        <button id="export-csv">导出CSV</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 竞赛详情模态框 -->
    <div class="modal" id="contest-modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title"></h2>
            <div class="modal-body">
                <div class="info-item">
                    <span class="label">来源：</span>
                    <span id="modal-source"></span>
                </div>
                <div class="info-item">
                    <span class="label">发布时间：</span>
                    <span id="modal-publish-time"></span>
                </div>
                <div class="info-item">
                    <span class="label">截止时间：</span>
                    <span id="modal-deadline"></span>
                    <span id="modal-days-left" class="days-left"></span>
                </div>
                <div class="info-item">
                    <span class="label">分类：</span>
                    <span id="modal-category"></span>
                </div>
                <div class="info-item">
                    <span class="label">组织者：</span>
                    <span id="modal-organizer"></span>
                </div>
                <div class="info-item">
                    <span class="label">参赛对象：</span>
                    <span id="modal-participants"></span>
                </div>
                <div class="info-item">
                    <span class="label">奖项设置：</span>
                    <span id="modal-prize"></span>
                </div>
                <div class="info-item">
                    <span class="label">联系方式：</span>
                    <span id="modal-contact"></span>
                </div>
                <div class="info-item">
                    <span class="label">摘要：</span>
                    <p id="modal-summary"></p>
                </div>
                <div class="tags" id="modal-tags">
                    <!-- 标签将通过JS动态生成 -->
                </div>
                <a href="" target="_blank" class="detail-link" id="modal-link">查看详情</a>
            </div>
            <div class="modal-actions">
                <button class="favorite-btn" id="favorite-btn">收藏</button>
                <button class="feedback-btn" id="like-btn">👍 有用</button>
                <button class="feedback-btn" id="dislike-btn">👎 无用</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
