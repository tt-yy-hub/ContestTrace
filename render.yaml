services:
  - type: web
    name: contesttrace-ai-rerank
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir contesttrace api_server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: qwen2.5:1.5b
      - key: OPENAI_TIMEOUT
        value: "30"
